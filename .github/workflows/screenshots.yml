name: スクリーンショット再取得

on:
  workflow_dispatch: # GitHub Actions UI から手動実行
  schedule:
    - cron: '0 3 * * 1' # 毎週月曜 03:00 UTC（日本時間 12:00）

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: scripts

      - name: Install Chromium
        run: npx playwright install --with-deps chromium
        working-directory: scripts

      - name: Capture screenshots
        run: npx ts-node capture-screenshots.ts
        working-directory: scripts
        env:
          MEMBER_ID: ${{ secrets.MEMBER_ID }}
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}

      - name: Commit and push screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/resident/images/
          git diff --staged --quiet || git commit -m "chore: regenerate screenshots [skip ci]"
          git push
